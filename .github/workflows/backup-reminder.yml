name: Monthly Backup Reminder

on:
  schedule:
    # Runs at 9 AM UTC on the 1st of every month
    - cron: '0 9 1 * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  send-backup-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Send backup reminder emails
        run: |
          curl -X POST https://dtmsbadmintoncoaching-backend.onrender.com/api/backups/send-reminder \
            -H "Content-Type: application/json" \
            -H "X-Cron-Key: 699a93cfa5f0f24c6c0456617f332426" \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Log completion
        if: success()
        run: echo "✅ Backup reminder emails sent successfully"

      - name: Log failure
        if: failure()
        run: echo "❌ Failed to send backup reminders"