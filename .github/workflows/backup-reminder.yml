name: Monthly Backup Reminder v2

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  send-backup-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send backup reminder
        run: |
          echo "Sending backup reminder to backend..."
          curl -s -X POST https://dtmsbadmintoncoaching-backend.onrender.com/api/backups/send-reminder \
            -H "content-type: application/json" \
            -H "x-cron-key: 699a93cfa5f0f24c6c0456617f332426" \
            -w "\nStatus: %{http_code}\n"
          echo "Backup reminder request completed"